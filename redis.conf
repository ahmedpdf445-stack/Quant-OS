# Redis Configuration for Sovereign-X Core OS
# Production-ready Redis setup with persistence and monitoring

# Server
port 6379
bind 0.0.0.0
timeout 0
tcp-backlog 511
tcp-keepalive 300

# Database
databases 16
save 900 1
save 300 10
save 60 10000

# Persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# AOF fsync settings
no-appendfsync-on-rewrite no

# Replication
repl-diskless-sync no
repl-diskless-sync-delay 5

# Memory
maxmemory 8gb
maxmemory-policy allkeys-lru
lazyfree-lazy-eviction no
lazyfree-lazy-expire no

# Logging
loglevel notice
logfile ""
syslog-enabled no

# Lua scripting
lua-time-limit 5000

# Slowlog
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 0

# Event notification
notify-keyspace-events ""

# Advanced
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Stream
stream-node-max-bytes 4096
stream-node-max-entries 100

# HyperLogLog
hll-sparse-max-bytes 3000

# Active rehashing
activerehashing yes

# Module loading
# loadmodule /path/to/module.so

# Security
requirepass ""
masterauth ""

# ACL configuration (optional for advanced deployments)
aclfile ""

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Frequency of rehashing the main dict
hz 10

# Dynamic HZ
dynamic-hz yes

# AOF rewrite incremental fsync
aof-rewrite-incremental-fsync yes

# RDB compression
rdbcompression yes

# RDB checksum
rdbchecksum yes

# Per-command monitoring
commandstats no

# keyspace notifications (for monitoring)
# notify-keyspace-events "KEg"

# Sentinel configuration (optional)
# sentinel monitor mymaster 127.0.0.1 6379 1
# sentinel down-after-milliseconds mymaster 30000
# sentinel parallel-syncs mymaster 1
# sentinel failover-timeout mymaster 180000
