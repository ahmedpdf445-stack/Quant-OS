version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: sovereign-x-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sovereign-x-net
    restart: unless-stopped

  sovereign-x:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereign-x-trading
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENABLE_LIVE_TRADING=False
      - LOG_LEVEL=INFO
      - TZ=UTC
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./audit:/app/audit
    ports:
      - "8000:8000"  # Prometheus metrics
    networks:
      - sovereign-x-net
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

volumes:
  redis_data:
    driver: local

networks:
  sovereign-x-net:
    driver: bridge
